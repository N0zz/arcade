name: Discord push notice

# Posts a message to the Discord changelog channel on every push to main.
# The webhook lives in a repo SECRET (never in this public file): add it at
# Settings → Secrets and variables → Actions → New repository secret
#   name:  DISCORD_CHANGELOG_WEBHOOK
#   value: <the changelog webhook URL>
# If the secret is missing, the job skips quietly.

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post commits to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          COMMITS: ${{ toJSON(github.event.commits) }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_CHANGELOG_WEBHOOK not set — skipping."; exit 0; fi
          # All commits in this push (covers batched pushes AND merges to main), newest last.
          # One bullet per commit = its summary line; cap at 20 so a big push can't overflow Discord.
          lines=$(printf '%s' "$COMMITS" | jq -r '(. // []) | .[0:20][] | "• " + (.message | split("\n")[0])')
          [ -z "$lines" ] && { echo "no commits to post"; exit 0; }
          payload=$(jq -Rn --arg t "📝 **Komyo Games** update" --arg m "$lines" \
            '{username:"Komyo Games", content: (($t + "\n" + $m)[0:1900]), allowed_mentions:{parse:[]}}')
          curl -sS -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
